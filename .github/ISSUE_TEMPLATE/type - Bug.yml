name: 🐞 Bug Report
description: Report a bug in the FireHub ecosystem (Core, Runtime, Adapters, Capabilities)
type: Bug

body:

  - type: input
    id: version
    attributes:
      label: "Affected Version"
      description: Enter the version of this repository where the issue occurs.
      placeholder: "e.g. v1.2.0"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: "PHP Version"
      description: PHP version used in the environment.
      placeholder: "e.g. 8.5.0"
    validations:
      required: true

  - type: checkboxes
    id: precheck
    attributes:
      label: "Pre-check"
      description: Please confirm before submitting
      options:
        - label: I have searched existing issues
          required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: "Expected Behavior"
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: "Actual Behavior"
      description: What actually happened instead?
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: "Steps to Reproduce"
      description: Provide steps to reliably reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      value: |
        - OS:
        - PHP SAPI:
        - Runtime Mode:
        - Deployment Type (Container / Bare metal / CI):
      render: markdown
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: "Logs / Stack Trace"
      description: Attach relevant logs or error traces if available.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: Screenshots, references, or other useful information.
    validations:
      required: false