name: 🧹 Chore
description: Small tasks or housekeeping work that doesn’t affect application functionality (e.g., updating dependencies, renaming files)
type: Chore

body:

  - type: input
    id: version
    attributes:
      label: "Affected Version"
      description: Enter the version of this repository where this chore applies (if relevant).
      placeholder: "e.g. v1.2.0"
    validations:
      required: false

  - type: dropdown
    id: chore-type
    attributes:
      label: "Chore Type"
      description: Select the type of maintenance task.
      options:
        - Dependency Update
        - File / Folder Rename
        - Code Formatting
        - Linting / Static Analysis
        - Build / CI Configuration
        - Documentation Cleanup
        - Configuration Update
        - Repository Cleanup
        - Other
    validations:
      required: true

  - type: checkboxes
    id: precheck
    attributes:
      label: "Pre-check"
      description: Please confirm before submitting
      options:
        - label: I confirm this change does NOT affect application behavior
          required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: Describe what housekeeping work is being done.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: "Reason"
      description: Why is this chore needed? (cleanup, consistency, maintenance, tooling, etc.)
    validations:
      required: true

  - type: textarea
    id: changes
    attributes:
      label: "Changes"
      description: List the specific changes made.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: "Impact"
      description: Confirm no functional impact and mention any indirect effects (if any).
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: Logs, references, or notes for reviewers.
    validations:
      required: false