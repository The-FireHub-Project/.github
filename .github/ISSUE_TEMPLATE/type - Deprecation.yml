name: ⚠️ Deprecation
description: Marking features, APIs, or code as deprecated
type: Deprecation

body:

  - type: input
    id: version
    attributes:
      label: "Affected Version"
      description: Enter the version where the deprecation is introduced.
      placeholder: "e.g. v1.2.0"
    validations:
      required: true

  - type: dropdown
    id: deprecation-type
    attributes:
      label: "Deprecation Type"
      description: Select what is being deprecated.
      options:
        - API Endpoint
        - Function / Method
        - Class / Module
        - Configuration Option
        - Feature
        - CLI Command
        - Internal Component
        - Other
    validations:
      required: true

  - type: checkboxes
    id: precheck
    attributes:
      label: "Pre-check"
      description: Please confirm before submitting
      options:
        - label: I confirm this does NOT remove functionality, only marks it as deprecated
          required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: Describe what is being deprecated and why.
    validations:
      required: true

  - type: textarea
    id: replacement
    attributes:
      label: "Replacement / Migration Path"
      description: What should users use instead?
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: "Reason for Deprecation"
      description: Why is this being deprecated? (architecture change, security, redesign, etc.)
    validations:
      required: true

  - type: textarea
    id: timeline
    attributes:
      label: "Deprecation Timeline"
      description: |
        Include planned lifecycle:
        - When it is deprecated
        - When removal is planned
        - Any grace period details
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: "Impact"
      description: Who/what is affected by this deprecation?
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: Links, migration examples, or technical notes.
    validations:
      required: false