name: 🚀 Feature Request
description: Requests for new features or capabilities to be added to the project
type: Feature

body:

  - type: input
    id: version
    attributes:
      label: "Affected Version"
      description: Enter the version of this repository where this feature request applies (if relevant).
      placeholder: "e.g. v1.2.0"
    validations:
      required: false

  - type: checkboxes
    id: precheck
    attributes:
      label: "Pre-check"
      description: Please confirm before submitting
      options:
        - label: I have searched existing feature requests and proposals
          required: true

  - type: textarea
    id: problem-statement
    attributes:
      label: "Problem Statement"
      description: What problem does this feature aim to solve?
    validations:
      required: true

  - type: textarea
    id: proposed-feature
    attributes:
      label: "Proposed Feature"
      description: Describe the new feature or capability you are requesting.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: "Use Case / Motivation"
      description: Why is this feature needed? What value does it bring?
    validations:
      required: true

  - type: textarea
    id: api-design
    attributes:
      label: "Proposed API / Design (optional)"
      description: If applicable, describe expected API, usage, or architecture.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: Other solutions or approaches considered.
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: "Impact"
      description: Potential impact on existing systems (breaking changes, performance, architecture).
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: Screenshots, examples, references, or related discussions.
    validations:
      required: false