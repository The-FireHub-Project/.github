name: 🚨 Incident Report
description: Reports of incidents affecting the project, service, or users
type: Incident

body:

  - type: input
    id: version
    attributes:
      label: "Affected Version"
      description: Enter the version of this repository where the incident occurred.
      placeholder: "e.g. v1.2.0"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "Severity:"
      description: Define impact level of the incident.
      options:
        - Low (non-critical)
        - Medium (degraded performance)
        - High (partial outage)
        - Critical (service outage)
    validations:
      required: true

  - type: dropdown
    id: detection-source
    attributes:
      label: "Detected By"
      options:
        - User report
        - Monitoring system
        - CI/CD
        - Internal testing
        - External alerting

  - type: checkboxes
    id: precheck
    attributes:
      label: "Pre-check"
      description: Please confirm before submitting
      options:
        - label: I have verified this is not a duplicate incident report
          required: true

  - type: textarea
    id: incident-summary
    attributes:
      label: "Incident Summary"
      description: Brief description of what is happening.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: "Impact"
      description: Who or what is affected by this incident?
    validations:
      required: true

  - type: textarea
    id: timeline
    attributes:
      label: "Timeline"
      description: |
        Provide a timeline of events:
        - When it started
        - When it was detected
        - Any changes or triggers observed
    validations:
      required: false

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: "Reproduction (if applicable)"
      description: Steps to reproduce the incident if possible.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: "Logs / Evidence"
      description: Attach logs, stack traces, monitoring data, or screenshots.
    validations:
      required: false

  - type: textarea
    id: mitigation
    attributes:
      label: "Mitigation / Workaround"
      description: Any temporary fix or mitigation steps applied.
    validations:
      required: false

  - type: textarea
    id: root-cause
    attributes:
      label: "Suspected Root Cause"
      description: If known, describe what caused the incident.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: Any extra information relevant for investigation.
    validations:
      required: false