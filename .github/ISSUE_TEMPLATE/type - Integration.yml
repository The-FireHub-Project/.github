name: 🔗 Integration
description: Tasks related to integrating external services, APIs, or modules
type: Integration

body:

  - type: input
    id: version
    attributes:
      label: "Affected Version"
      description: Enter the version where this integration applies (if relevant).
      placeholder: "e.g. v1.2.0"
    validations:
      required: false

  - type: dropdown
    id: integration-type
    attributes:
      label: "Integration Type"
      description: Select the type of integration work.
      options:
        - External API Integration
        - Third-party Service
        - Internal Module Integration
        - Database Integration
        - Messaging / Queue System
        - Payment Gateway
        - Authentication Provider
        - Cloud Service
        - SDK / Library Integration
        - Other
    validations:
      required: true

  - type: checkboxes
    id: precheck
    attributes:
      label: "Pre-check"
      description: Please confirm before submitting
      options:
        - label: This is integration work and not a standalone feature or bug fix
          required: true

  - type: textarea
    id: target-system
    attributes:
      label: "Target System"
      description: What system, API, or module is being integrated?
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: "Integration Goal"
      description: What should be achieved through this integration?
    validations:
      required: true

  - type: textarea
    id: approach
    attributes:
      label: "Approach"
      description: How will the integration be implemented? (auth, data flow, adapters, etc.)
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: "Dependencies"
      description: External services, SDKs, or internal modules required.
    validations:
      required: false

  - type: textarea
    id: risks
    attributes:
      label: "Risks / Constraints"
      description: Rate limits, compatibility issues, latency, security concerns, etc.
    validations:
      required: false

  - type: textarea
    id: testing
    attributes:
      label: "Testing Strategy"
      description: How will the integration be validated? (mocking, staging, sandbox, etc.)
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: API docs, diagrams, credentials notes (no secrets), or references.
    validations:
      required: false