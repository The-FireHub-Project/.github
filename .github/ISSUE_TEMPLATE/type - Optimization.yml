name: ⚡ Optimization
description: Requests to optimize code, processes, or resources for better efficiency
type: Optimization

body:

  - type: input
    id: version
    attributes:
      label: "Affected Version"
      description: Enter the version of this repository where optimization applies.
      placeholder: "e.g. v1.2.0"
    validations:
      required: true

  - type: dropdown
    id: optimization-area
    attributes:
      label: "Optimization Area"
      description: Select the area being optimized.
      options:
        - Code Execution
        - Memory Usage
        - CPU Usage
        - Database Queries
        - API Calls
        - File / IO Operations
        - Build / CI Process
        - Architecture / Design
        - Other
    validations:
      required: true

  - type: checkboxes
    id: precheck
    attributes:
      label: "Pre-check"
      description: Please confirm before submitting
      options:
        - label: I have verified existing optimization issues or discussions
          required: true

  - type: textarea
    id: current-state
    attributes:
      label: "Current State"
      description: Describe the current implementation or behavior.
    validations:
      required: true

  - type: textarea
    id: bottleneck
    attributes:
      label: "Bottleneck / Inefficiency"
      description: What is inefficient or slow in the current implementation?
    validations:
      required: true

  - type: textarea
    id: proposed-optimization
    attributes:
      label: "Proposed Optimization"
      description: Describe how the system should be optimized.
    validations:
      required: true

  - type: textarea
    id: expected-impact
    attributes:
      label: "Expected Impact"
      description: What improvement is expected? (performance, memory, speed, etc.)
    validations:
      required: true

  - type: textarea
    id: tradeoffs
    attributes:
      label: "Trade-offs"
      description: Any possible downsides of this optimization.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: Benchmarks, logs, comparisons, or references.
    validations:
      required: false