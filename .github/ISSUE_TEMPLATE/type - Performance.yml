name: 🚀 Performance
description: Issues related to application performance, including time and memory usage
type: Performance

body:

  - type: input
    id: version
    attributes:
      label: "Affected Version"
      description: Enter the version of this repository where performance issue occurs.
      placeholder: "e.g. v1.2.0"
    validations:
      required: true

  - type: dropdown
    id: performance-area
    attributes:
      label: "Performance Area"
      description: Select the area where performance issue is observed.
      options:
        - Request Latency
        - Response Time
        - Memory Usage
        - CPU Usage
        - Database Performance
        - API Performance
        - Startup / Boot Time
        - Throughput
        - Concurrency / Load
        - Other
    validations:
      required: true

  - type: checkboxes
    id: precheck
    attributes:
      label: "Pre-check"
      description: Please confirm before submitting
      options:
        - label: I have verified this is a real performance issue (not a bug or configuration issue)
          required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: "Current Performance Behavior"
      description: Describe how the system currently performs (include metrics if possible).
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: "Expected Performance"
      description: What performance level is expected?
    validations:
      required: true

  - type: textarea
    id: bottleneck
    attributes:
      label: "Observed Bottleneck"
      description: Where is the slowdown or resource pressure observed?
    validations:
      required: true

  - type: textarea
    id: metrics
    attributes:
      label: "Metrics / Evidence"
      description: Include benchmarks, profiling data, logs, or monitoring results.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: System context where performance issue occurs
      value: |
        - OS:
        - PHP Version:
        - Runtime Mode:
        - Load / Traffic Conditions:
      render: markdown
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: Any graphs, comparisons, or references.
    validations:
      required: false