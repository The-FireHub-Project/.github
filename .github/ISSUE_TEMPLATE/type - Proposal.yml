name: 💡 Proposal
description: Structured proposals for new ideas, workflows, architectural directions, or project improvements before formal implementation or RFC discussion
type: Proposal

body:

  - type: input
    id: version
    attributes:
      label: "Affected Version"
      description: Enter the version this proposal relates to (if applicable).
      placeholder: "e.g. v1.2.0"
    validations:
      required: false

  - type: dropdown
    id: proposal-type
    attributes:
      label: "Proposal Type"
      description: Select the category of this proposal.
      options:
        - Architecture Proposal
        - Workflow Improvement
        - API Design Proposal
        - Performance Improvement Idea
        - Developer Experience (DX)
        - Governance / Process Change
        - Refactoring Direction
        - New Concept / Idea
        - Other
    validations:
      required: true

  - type: checkboxes
    id: precheck
    attributes:
      label: "Pre-check"
      description: Please confirm before submitting
      options:
        - label: This is a proposal and not a finalized implementation or RFC
          required: true

  - type: textarea
    id: summary
    attributes:
      label: "Summary"
      description: Brief overview of the proposal.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "Problem Statement"
      description: What problem or limitation does this proposal address?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: "Proposed Solution"
      description: Describe the proposed idea or approach.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: Other possible approaches and why they were not chosen.
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: "Impact Analysis"
      description: How will this affect architecture, performance, workflow, or users?
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: "Risks / Trade-offs"
      description: Downsides, complexity, or potential issues with this proposal.
    validations:
      required: false

  - type: textarea
    id: next-steps
    attributes:
      label: "Next Steps"
      description: Should this become an RFC, experiment, spike, or be rejected?
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: "References"
      description: Links, diagrams, code examples, or inspiration sources.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: Any extra information useful for reviewers.
    validations:
      required: false