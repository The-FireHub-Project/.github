name: ♨️ RFC
description: Request for Comments (RFC) on technical changes, architecture, or experimental implementations
type: RFC

body:

  - type: input
    id: version
    attributes:
      label: "Affected Version"
      description: Enter the version of this repository relevant to the RFC context (if applicable).
      placeholder: "e.g. v1.2.0"
    validations:
      required: false

  - type: checkboxes
    id: precheck
    attributes:
      label: "Pre-check"
      description: Please confirm before submitting
      options:
        - label: I have checked existing RFCs and discussions
          required: true

  - type: textarea
    id: problem-statement
    attributes:
      label: "Problem Statement"
      description: What problem does this RFC aim to solve?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: "Proposed Solution"
      description: Describe the proposed technical or architectural change.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: Other approaches that were considered and why they were not chosen.
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: "Impact"
      description: What are the consequences of this change? (breaking changes, performance, architecture, etc.)
    validations:
      required: true

  - type: textarea
    id: implementation-notes
    attributes:
      label: "Implementation Notes"
      description: Technical details, design considerations, or pseudo-architecture.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: Links, diagrams, references, or supporting materials.
    validations:
      required: false