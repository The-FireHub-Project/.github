name: 🔬 Research
description: Investigation, analysis, benchmarking, or information-gathering tasks intended to support technical or strategic decision-making
type: Research

body:

  - type: input
    id: version
    attributes:
      label: "Affected Version"
      description: Enter the version this research relates to (if applicable).
      placeholder: "e.g. v1.2.0"
    validations:
      required: false

  - type: dropdown
    id: research-type
    attributes:
      label: "Research Type"
      description: Select the type of research activity.
      options:
        - Technical Analysis
        - Benchmarking
        - Performance Evaluation
        - Architecture Comparison
        - Library / Tool Evaluation
        - Market / Technology Review
        - Feasibility Analysis
        - Data Analysis
        - Other
    validations:
      required: true

  - type: checkboxes
    id: precheck
    attributes:
      label: "Pre-check"
      description: Please confirm before submitting
      options:
        - label: This is research-only work and does not include implementation
          required: true

  - type: textarea
    id: objective
    attributes:
      label: "Objective"
      description: What decision or question should this research support?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: "Scope"
      description: What is included in this research (and what is explicitly out of scope)?
    validations:
      required: true

  - type: textarea
    id: methodology
    attributes:
      label: "Methodology"
      description: How will the research be conducted? (benchmarks, comparisons, data sources, etc.)
    validations:
      required: true

  - type: textarea
    id: findings
    attributes:
      label: "Findings"
      description: Key observations, data, comparisons, or insights gathered.
    validations:
      required: false

  - type: textarea
    id: analysis
    attributes:
      label: "Analysis"
      description: Interpretation of findings and implications for FireHub decisions.
    validations:
      required: false

  - type: textarea
    id: recommendation
    attributes:
      label: "Recommendation"
      description: Suggested direction based on research results.
    validations:
      required: false

  - type: textarea
    id: limitations
    attributes:
      label: "Limitations / Constraints"
      description: What is missing, uncertain, or not fully validated in this research?
    validations:
      required: false

  - type: textarea
    id: next-steps
    attributes:
      label: "Next Steps"
      description: What should happen after this research (RFC, Spike, Experiment, etc.)?
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: "References"
      description: Links, papers, benchmarks, or external sources.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: Any extra notes, charts, or supporting material.
    validations:
      required: false