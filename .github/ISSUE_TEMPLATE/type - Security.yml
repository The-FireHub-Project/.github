name: 🔐 Security
description: Issues related to security vulnerabilities or threats
type: Security

body:

  - type: input
    id: version
    attributes:
      label: "Affected Version"
      description: Enter the version of this repository where the security issue was detected.
      placeholder: "e.g. v1.2.0"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      description: Classify the security impact level.
      options:
        - Low (informational / minor issue)
        - Medium (potential risk, limited exposure)
        - High (serious vulnerability)
        - Critical (active exploit / severe exposure)
    validations:
      required: true

  - type: checkboxes
    id: precheck
    attributes:
      label: "Pre-check"
      description: Please confirm before submitting
      options:
        - label: I confirm this is a security-related issue and not a general bug or performance problem
          required: true

  - type: textarea
    id: vulnerability-summary
    attributes:
      label: "Vulnerability Summary"
      description: Describe the security issue clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: "Impact"
      description: What is affected? (data exposure, auth bypass, injection, etc.)
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: "Steps to Reproduce"
      description: Provide steps to reproduce the vulnerability (if applicable).
    validations:
      required: false

  - type: textarea
    id: affected-components
    attributes:
      label: "Affected Components"
      description: Which modules, services, or layers are affected?
    validations:
      required: false

  - type: textarea
    id: mitigation
    attributes:
      label: "Mitigation / Workaround"
      description: Any temporary fix or mitigation steps applied.
    validations:
      required: false

  - type: textarea
    id: root-cause
    attributes:
      label: "Suspected Root Cause"
      description: If known, explain what caused the vulnerability.
    validations:
      required: false

  - type: textarea
    id: disclosure-notes
    attributes:
      label: "Disclosure Notes"
      description: Internal notes about reporting, responsible disclosure, or handling.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: Logs, proofs of concept, screenshots, or references.
    validations:
      required: false