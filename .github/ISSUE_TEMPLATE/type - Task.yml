name: 🧩 Task
description: Generic task or work item that doesn’t fit into other categories
type: Task

body:

  - type: input
    id: version
    attributes:
      label: "Affected Version"
      description: Enter the version where this task applies (if relevant).
      placeholder: "e.g. v1.2.0"
    validations:
      required: false

  - type: dropdown
    id: task-type
    attributes:
      label: "Task Type"
      description: Select the nature of this task.
      options:
        - Implementation Task
        - Cleanup Task
        - Research Task
        - Configuration Task
        - Documentation Task
        - Migration Task
        - Analysis Task
        - Other
    validations:
      required: true

  - type: checkboxes
    id: precheck
    attributes:
      label: "Pre-check"
      description: Please confirm before submitting
      options:
        - label: This task does not clearly belong to another issue type
          required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: Describe what needs to be done.
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: "Objective"
      description: What is the goal or expected outcome of this task?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps / Plan"
      description: Break down how the task should be executed.
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: "Dependencies / Blockers"
      description: Any dependencies or blocking issues.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: Notes, references, or relevant links.
    validations:
      required: false