name: Add to project

on:
  workflow_call:
    inputs:
      projectNumber:
        required: false
        type: number
        default: 2
      labeled:
        required: false
        type: string
    secrets:
      GH_TOKEN:
        required: true

jobs:
  add-to-project:

    # -------------------------
    # ADD TO PROJECT
    # -------------------------
    name: Add issue to project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v2.0.0
        with:
          project-url: https://github.com/orgs/The-FireHub-Project/projects/${{ inputs.projectNumber }}
          github-token: ${{ secrets.GH_TOKEN }}
          labeled: ${{ inputs.labeled }}